<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calculator | The Odin Project</title>
</head>
<body class="page">
    <div class="calculator">
        <p class="calculator__display" aria-live="polite" dir="rtl"></p>
        <div class="calculator__btns">
            <button class="btn btn_type_digit">7</button>
            <button class="btn btn_type_digit">8</button>
            <button class="btn btn_type_digit">9</button>
            <button class="btn btn_type_operator">÷</button>
            <button class="btn btn_type_digit">4</button>
            <button class="btn btn_type_digit">5</button>
            <button class="btn btn_type_digit">6</button>
            <button class="btn btn_type_operator">×</button>
            <button class="btn btn_type_digit">1</button>
            <button class="btn btn_type_digit">2</button>
            <button class="btn btn_type_digit">3</button>
            <button class="btn btn_type_operator">-</button>
            <button class="btn btn_type_digit">0</button>
            <button class="btn btn_type_clear">AC</button>
            <button class="btn btn_type_evaluate">=</button>
            <button class="btn btn_type_operator">+</button>
        </div>
    </div>
</body>
</html>
