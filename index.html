<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Calculator | The Odin Project</title>
</head>
<body class="page">
    <div class="calculator">
        <p class="calculator__display" aria-live="polite" dir="rtl"></p>
        <div class="calculator__btns">
            <button class="btn btn_type_digit" data-value="7">7</button>
            <button class="btn btn_type_digit" data-value="8">8</button>
            <button class="btn btn_type_digit" data-value="9">9</button>
            <button class="btn btn_type_operator" data-operator="/">÷</button>
            <button class="btn btn_type_digit" data-value="4">4</button>
            <button class="btn btn_type_digit" data-value="5">5</button>
            <button class="btn btn_type_digit" data-value="6">6</button>
            <button class="btn btn_type_operator" data-operator="*">×</button>
            <button class="btn btn_type_digit" data-value="1">1</button>
            <button class="btn btn_type_digit" data-value="2">2</button>
            <button class="btn btn_type_digit" data-value="3">3</button>
            <button class="btn btn_type_operator" data-operator="-">-</button>
            <button class="btn btn_type_digit" data-value="0">0</button>
            <button class="btn btn_type_clear">AC</button>
            <button class="btn btn_type_evaluate">=</button>
            <button class="btn btn_type_operator" data-operator="+">+</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
